# Copy to ~/.dbt/profiles.yml or set DBT_PROFILES_DIR. Local DuckDB by default.
market_surveillance:
  target: local
  outputs:
    local:
      type: duckdb
      path: "data/warehouse.duckdb"
      threads: 4
      extensions: [parquet]
    snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'TRANSFORMER') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'COMPUTE_WH') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'MARKET_SURVEILLANCE') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA', 'ANALYTICS') }}"
      threads: 4
    motherduck:
      type: duckdb
      path: "md:market_surveillance?motherduck_token={{ env_var('MOTHERDUCK_TOKEN') }}"
      threads: 4
      extensions: [httpfs, parquet]
