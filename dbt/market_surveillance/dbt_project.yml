name: "market_surveillance"
version: "1.0.0"
config-version: 2
profile: "market_surveillance"

model-paths: ["models"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  lake_path: "data/lake"
  price_range_threshold: 0.15   # 15-point probability swing in a minute
  coherence_tolerance: 0.03     # how far market outcomes may sum from 1.0
  volume_z_threshold: 3.0

models:
  market_surveillance:
    staging:
      +materialized: view
    marts:
      +materialized: table
    reconciliation:
      +materialized: table
