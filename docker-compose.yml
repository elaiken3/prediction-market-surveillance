# Local broker only; ingestion, Spark, dbt, dashboard run on the host.
#   docker compose up -d    (console UI: http://localhost:8080)
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:19092
    ports: ["19092:19092", "9644:9644"]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
  console:
    image: redpandadata/console:v2.7.2
    depends_on: [redpanda]
    ports: ["8080:8080"]
    environment:
      KAFKA_BROKERS: "redpanda:29092"
